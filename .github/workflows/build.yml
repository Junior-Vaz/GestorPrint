name: Build & Push Docker Images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner name
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestorprint-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestorprint-backend:${{ github.sha }}

  build-whatsapp-ai:
    name: Build WhatsApp AI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner name
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push whatsapp-ai
        uses: docker/build-push-action@v5
        with:
          context: ./whatsapp-ai
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestorprint-whatsapp-ai:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestorprint-whatsapp-ai:${{ github.sha }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner name
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestorprint-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/gestorprint-frontend:${{ github.sha }}

  update-easypanel:
    name: Update EasyPanel Compose
    runs-on: ubuntu-latest
    needs: [build-backend, build-whatsapp-ai, build-frontend]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner name
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Update image tags in docker-compose.easypanel.yml
        run: |
          sed -i "s|ghcr.io/${{ env.OWNER }}/gestorprint-backend:.*|ghcr.io/${{ env.OWNER }}/gestorprint-backend:${{ github.sha }}|g" docker-compose.easypanel.yml
          sed -i "s|ghcr.io/${{ env.OWNER }}/gestorprint-whatsapp-ai:.*|ghcr.io/${{ env.OWNER }}/gestorprint-whatsapp-ai:${{ github.sha }}|g" docker-compose.easypanel.yml
          sed -i "s|ghcr.io/${{ env.OWNER }}/gestorprint-frontend:.*|ghcr.io/${{ env.OWNER }}/gestorprint-frontend:${{ github.sha }}|g" docker-compose.easypanel.yml

      - name: Commit updated compose file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docker-compose.easypanel.yml
          git diff --staged --quiet || git commit -m "deploy: update image tags to ${GITHUB_SHA::7}"
          git push
