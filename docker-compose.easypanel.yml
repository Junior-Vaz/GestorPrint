services:
  # ─────────────────────────────────────────────
  # 1. PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - gestorprint_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gestorprint_admin -d gestorprint_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # 2. Backend (API)
  # ─────────────────────────────────────────────
  backend:
    image: ghcr.io/junior-vaz/gestorprint-backend:d8b7956acab83f798a2e64bf77a343036a09d22d
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:?MP_ACCESS_TOKEN is required}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:?MP_PUBLIC_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3000
      ASAAS_API_KEY: ${ASAAS_API_KEY:?ASAAS_API_KEY is required}
      ASAAS_ENV: ${ASAAS_ENV:-production}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:?ASAAS_WEBHOOK_TOKEN is required}
      API_URL: ${API_URL:?API_URL is required}
    volumes:
      - gestorprint_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # 3. WhatsApp AI Agent
  # ─────────────────────────────────────────────
  whatsapp-ai:
    image: ghcr.io/junior-vaz/gestorprint-whatsapp-ai:d8b7956acab83f798a2e64bf77a343036a09d22d
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3005
      ERP_API_URL: ${ERP_API_URL:-http://backend:3000/api}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      TENANT_ID: ${TENANT_ID:-1}
    # No EasyPanel, o mapeamento de domínio é feito via UI apontando para a porta 3005

  # ─────────────────────────────────────────────
  # 4. Frontend (Web)
  # ─────────────────────────────────────────────
  frontend:
    image: ghcr.io/junior-vaz/gestorprint-frontend:d8b7956acab83f798a2e64bf77a343036a09d22d
    restart: unless-stopped
    depends_on:
      - backend
    # No EasyPanel, o mapeamento de domínio é feito via UI apontando para a porta 80

  # ─────────────────────────────────────────────
  # 5. SaaS Admin Panel
  # ─────────────────────────────────────────────
  saas-admin:
    image: ghcr.io/junior-vaz/gestorprint-saas-admin:d8b7956acab83f798a2e64bf77a343036a09d22d
    restart: unless-stopped
    depends_on:
      - backend
    # No EasyPanel, o mapeamento de domínio é feito via UI apontando para a porta 80
    # Sugestão de domínio: admin.gestorprint.com.br

volumes:
  gestorprint_postgres_data:
  gestorprint_uploads:
