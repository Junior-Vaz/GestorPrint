services:
  # ─────────────────────────────────────────────
  # 1. PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestorprint_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_easypanel}
      POSTGRES_DB: ${POSTGRES_DB:-gestorprint_db}
    volumes:
      - gestorprint_postgres_data_v2:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestorprint_admin} -d ${POSTGRES_DB:-gestorprint_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # 2. Backend (API)
  # ─────────────────────────────────────────────
  backend:
    image: ghcr.io/junior-vaz/gestorprint-backend:3114e0e581456f7af5d75360e1ed882a3b4fac24
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gestorprint_admin}:${POSTGRES_PASSWORD:-change_me_in_easypanel}@db:5432/${POSTGRES_DB:-gestorprint_db}?schema=public
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-change_me_in_easypanel}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-change_me_in_easypanel}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_easypanel}
      PORT: 3000
      ASAAS_API_KEY: ${ASAAS_API_KEY:-change_me_in_easypanel}
      ASAAS_ENV: ${ASAAS_ENV:-production}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-change_me_in_easypanel}
      API_URL: ${API_URL:-https://api.gestorprint.com.br}
    volumes:
      - gestorprint_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────
  # 3. WhatsApp AI Agent
  # ─────────────────────────────────────────────
  whatsapp-ai:
    image: ghcr.io/junior-vaz/gestorprint-whatsapp-ai:3114e0e581456f7af5d75360e1ed882a3b4fac24
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3005
      ERP_API_URL: ${ERP_API_URL:-http://backend:3000/api}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change_me_in_easypanel}
      TENANT_ID: ${TENANT_ID:-1}
    # No EasyPanel, o mapeamento de domínio é feito via UI apontando para a porta 3005

  # ─────────────────────────────────────────────
  # 4. Frontend (Web)
  # ─────────────────────────────────────────────
  frontend:
    image: ghcr.io/junior-vaz/gestorprint-frontend:3114e0e581456f7af5d75360e1ed882a3b4fac24
    restart: unless-stopped
    depends_on:
      - backend
    # No EasyPanel, o mapeamento de domínio é feito via UI apontando para a porta 80

  # ─────────────────────────────────────────────
  # 5. SaaS Admin Panel
  # ─────────────────────────────────────────────
  saas-admin:
    image: ghcr.io/junior-vaz/gestorprint-saas-admin:3114e0e581456f7af5d75360e1ed882a3b4fac24
    restart: unless-stopped
    depends_on:
      - backend
    # No EasyPanel, o mapeamento de domínio é feito via UI apontando para a porta 80
    # Sugestão de domínio: admin.gestorprint.com.br

volumes:
  gestorprint_postgres_data_v2:
  gestorprint_uploads:
