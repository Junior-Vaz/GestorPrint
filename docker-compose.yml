services:
  # ─────────────────────────────────────────────
  # 1. PostgreSQL Database
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: gestorprint_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - gestorprint_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestorprint_admin} -d ${POSTGRES_DB:-gestorprint_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # 2. Backend (NestJS API)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestorprint_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:?MP_ACCESS_TOKEN is required}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:?MP_PUBLIC_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3000
      ASAAS_API_KEY: ${ASAAS_API_KEY:?ASAAS_API_KEY is required}
      ASAAS_ENV: ${ASAAS_ENV:-sandbox}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:?ASAAS_WEBHOOK_TOKEN is required}
      API_URL: ${API_URL:?API_URL is required}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - gestorprint_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # 3. WhatsApp AI Agent
  # ─────────────────────────────────────────────
  whatsapp-ai:
    build:
      context: ./whatsapp-ai
      dockerfile: Dockerfile
    container_name: gestorprint_whatsapp_ai
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3005
      ERP_API_URL: ${ERP_API_URL:-http://backend:3000/api}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      TENANT_ID: ${TENANT_ID:-1}
    ports:
      - "${WHATSAPP_AI_PORT:-3005}:3005"

  # ─────────────────────────────────────────────
  # 4. Frontend (Vue.js + Nginx)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: gestorprint_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

  # ─────────────────────────────────────────────
  # 5. SaaS Admin Panel (Vue.js + Nginx)
  # ─────────────────────────────────────────────
  saas-admin:
    build:
      context: ./saas-admin
      dockerfile: Dockerfile
    container_name: gestorprint_saas_admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${SAAS_ADMIN_PORT:-5174}:80"

volumes:
  gestorprint_postgres_data:
  gestorprint_uploads:
